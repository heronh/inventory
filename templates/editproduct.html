<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Produto</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    nav a { margin-right: 12px; }
    form { max-width: 700px; margin-top: 16px; }
    input, textarea, button, select { width: 100%; padding: 8px; margin-top: 6px; }
  </style>
</head>
<body>
  <nav>
    <a href="/inventory">Estoque</a>
    <a href="/products/new">Novo Produto</a>
    <a href="/logout" onclick="return confirm('Tem certeza que deseja sair?');">Sair</a>
  </nav>
  <h1>Editar Produto</h1>
  <form method="get" action="/products/edit">
    <label>Selecione o produto</label>
    <select name="id" title="Selecione o produto" onchange="this.form.submit()">
      <option value="">Escolha o produto</option>
      {{range .Products}}
      <option value="{{.ID}}">{{.Name}} ({{.Code}})</option>
      {{end}}
    </select>
  </form>
  {{if .Product}}
  <form method="post" action="/products/update">
    <input type="hidden" name="id" value="{{.Product.ID}}">
    <input name="name" title="Nome" value="{{.Product.Name}}" required>
    <textarea name="description" title="Descrição">{{.Product.Description}}</textarea>
    <input name="code" title="Código" value="{{.Product.Code}}" required>
    <input type="number" step="0.01" name="price" title="Preço" value="{{printf "%.2f" .Product.Price}}" required>
    <input type="number" step="0.01" name="quantity" title="Quantidade" value="{{printf "%.2f" .Product.Quantity}}" required>
    <input name="unit" title="Unidade" value="{{.Product.Unit}}" required>
    <input type="number" step="0.01" name="minimum_stock" title="Estoque Mínimo" value="{{printf "%.2f" .Product.MinimumStock}}" required>
    <button type="submit">Atualizar Produto</button>
  </form>
  {{end}}
  <footer>
    <a href="/tarefas">Tarefas</a>
  </footer>
</body>
</html>
