<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Cliente</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    nav a { margin-right: 12px; }
    form { max-width: 700px; margin-top: 16px; }
    input, button, select { width: 100%; padding: 8px; margin-top: 6px; }
  </style>
</head>
<body>
  <nav>
    <a href="/inventory">Estoque</a>
    <a href="/clients/new">Novo Cliente</a>
    <a href="/logout" onclick="return confirm('Tem certeza que deseja sair?');">Sair</a>
  </nav>
  <h1>Editar Cliente</h1>
  <form method="get" action="/clients/edit">
    <label>Selecione o cliente</label>
    <select name="id" title="Selecione o cliente" onchange="this.form.submit()">
      <option value="">Escolha o cliente</option>
      {{range .Clients}}
      <option value="{{.ID}}">{{.Name}}</option>
      {{end}}
    </select>
  </form>
  {{if .Client}}
  <form method="post" action="/clients/update">
    <input type="hidden" name="id" value="{{.Client.ID}}">
    <input name="name" title="Nome" value="{{.Client.Name}}" required>
    <input name="phone" title="Telefone" value="{{.Client.Phone}}">
    <input name="tax_id" title="CNPJ/CPF" value="{{.Client.TaxID}}">
    <input name="zip_code" title="CEP" value="{{.Client.ZIPCode}}">
    <input name="street" title="Rua" value="{{.Client.Street}}">
    <input name="number" title="Número" value="{{.Client.Number}}">
    <input name="complement" title="Complemento" value="{{.Client.Complement}}">
    <input name="neighborhood" title="Bairro" value="{{.Client.Neighborhood}}">
    <input name="city" title="Cidade" value="{{.Client.City}}">
    <input name="state" title="Estado" value="{{.Client.State}}">
    <button type="submit">Atualizar Cliente</button>
  </form>
  {{end}}
  <footer>
    <a href="/tarefas">Tarefas</a>
  </footer>
</body>
</html>
