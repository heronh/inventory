<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Fornecedor</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    nav a { margin-right: 12px; }
    form { max-width: 700px; margin-top: 16px; }
    input, button, select { width: 100%; padding: 8px; margin-top: 6px; }
  </style>
</head>
<body>
  <nav>
    <a href="/inventory">Estoque</a>
    <a href="/suppliers/new">Novo Fornecedor</a>
    <a href="/logout" onclick="return confirm('Tem certeza que deseja sair?');">Sair</a>
  </nav>
  <h1>Editar Fornecedor</h1>
  <form method="get" action="/suppliers/edit">
    <label>Selecione o fornecedor</label>
    <select name="id" title="Selecione o fornecedor" onchange="this.form.submit()">
      <option value="">Escolha o fornecedor</option>
      {{range .Suppliers}}
      <option value="{{.ID}}">{{.Name}}</option>
      {{end}}
    </select>
  </form>
  {{if .Supplier}}
  <form method="post" action="/suppliers/update">
    <input type="hidden" name="id" value="{{.Supplier.ID}}">
    <input name="name" title="Nome" value="{{.Supplier.Name}}" required>
    <input name="trade_name" title="Nome Fantasia" value="{{.Supplier.TradeName}}">
    <input name="tax_id" title="CNPJ" value="{{.Supplier.TaxID}}">
    <input name="zip_code" title="CEP" value="{{.Supplier.ZIPCode}}">
    <input name="street" title="Rua" value="{{.Supplier.Street}}">
    <input name="number" title="Número" value="{{.Supplier.Number}}">
    <input name="complement" title="Complemento" value="{{.Supplier.Complement}}">
    <input name="neighborhood" title="Bairro" value="{{.Supplier.Neighborhood}}">
    <input name="city" title="Cidade" value="{{.Supplier.City}}">
    <input name="state" title="Estado" value="{{.Supplier.State}}">
    <button type="submit">Atualizar Fornecedor</button>
  </form>
  {{end}}
  <footer>
    <a href="/tarefas">Tarefas</a>
  </footer>
</body>
</html>
