<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bem-vindo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    .box {
      max-width: 420px;
      margin: 80px auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 24px;
    }

    input,
    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      box-sizing: border-box;
    }

    .logo {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .error {
      color: #b00020;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="logo">Estoque...</div>
    <p>Bem-vindo ao sistema de controle de estoque</p>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    <form method="post" action="/login">
      <label>Email</label>
      <input type="email" name="email" title="Email" required>
      <label>Senha</label>
      <input type="password" name="password" title="Senha" required>
      <button type="submit">Entrar</button>
    </form>
  </div>
  <div class="box">
    <p>Desenvolvido por Heron Hurpia</p>
  </div>
  <div class="box">
    <p>Desenvolvido por Heron Hurpia...</p>
  </div>
</body>

</html>
