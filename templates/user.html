<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuário</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    nav a { margin-right: 12px; }
    .error { color: #b00020; }
    .success { color: #0a7a22; }
    form { max-width: 420px; }
    input, button { width: 100%; padding: 8px; margin-top: 6px; }
  </style>
</head>
<body>
  <nav>
    <a href="/inventory">Estoque</a>
    <a href="/entries">Entradas</a>
    <a href="/sales">Vendas</a>
    <a href="/logout" onclick="return confirm('Tem certeza que deseja sair?');">Sair</a>
  </nav>
  <h1>Editar Usuário</h1>
  {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
  {{if .Success}}<p class="success">{{.Success}}</p>{{end}}
  <form method="post" action="/user/update">
    <label>Nome</label>
    <input type="text" name="name" value="{{.User.Name}}" title="Nome" required>
    <label>Nova Senha</label>
    <input type="password" name="password" placeholder="deixe em branco para manter a atual">
    <button type="submit">Salvar</button>
  </form>
  <footer>
    <a href="/tarefas">Tarefas</a>
  </footer>
</body>
</html>
