<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Produto</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    nav a { margin-right: 12px; }
    .error { color: #b00020; }
    .success { color: #0a7a22; }
    form { max-width: 700px; }
    input, textarea, button { width: 100%; padding: 8px; margin-top: 6px; }
  </style>
</head>
<body>
  <nav>
    <a href="/inventory">Estoque</a>
    <a href="/products/edit">Editar Produto</a>
    <a href="/logout" onclick="return confirm('Tem certeza que deseja sair?');">Sair</a>
  </nav>
  <h1>Novo Produto</h1>
  {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
  {{if .Success}}<p class="success">{{.Success}}</p>{{end}}
  <form method="post" action="/products/create">
    <input name="name" placeholder="Nome" required>
    <textarea name="description" placeholder="Descrição"></textarea>
    <input name="code" placeholder="Código" required>
    <input type="number" step="0.01" name="price" placeholder="Preço" required>
    <input type="number" step="0.01" name="quantity" placeholder="Quantidade" value="0" required>
    <input name="unit" placeholder="Unidade (ex.: un, kg)" required>
    <input type="number" step="0.01" name="minimum_stock" placeholder="Estoque Mínimo" required>
    <button type="submit">Criar Produto</button>
  </form>
  <footer>
    <a href="/tarefas">Tarefas</a>
  </footer>
</body>
</html>
